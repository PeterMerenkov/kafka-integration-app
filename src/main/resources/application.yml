server:
  port: 8080

spring:
  kafka:
    bootstrap-servers: localhost:9092,localhost:9093,localhost:9094

app:
  kafka:
    consumers-enabled: true
    consumers:
      demo-message:
        topic: demo-topic
        group-id: kafka-integration-group
        auto-offset-reset: earliest
        concurrency: 1
        auto-startup: true
        enable-auto-commit: true
        auto-commit-interval-ms: 1000
        max-poll-interval-ms: 300000
        max-poll-records: 500
        log-events: false
      user-created:
        topic: user-created-topic
        group-id: kafka-integration-group
        auto-offset-reset: earliest
        concurrency: 1
        auto-startup: true
        enable-auto-commit: true
        auto-commit-interval-ms: 1000
        max-poll-interval-ms: 300000
        max-poll-records: 500
        log-events: false
      order-paid:
        topic: order-paid-topic
        group-id: billing-group
        auto-offset-reset: latest
        concurrency: 1
        auto-startup: true
        enable-auto-commit: true
        auto-commit-interval-ms: 1000
        max-poll-interval-ms: 300000
        max-poll-records: 500
        log-events: false
      inventory-adjusted:
        topic: inventory-adjusted-topic
        group-id: kafka-integration-group
        auto-offset-reset: earliest
        concurrency: 2
        auto-startup: true
        enable-auto-commit: true
        auto-commit-interval-ms: 1000
        max-poll-interval-ms: 300000
        max-poll-records: 500
        log-events: false
    legacy:
      alpha:
        topic: legacy-a-topic
        group-id: legacy-a-group
        concurrency: 1
      beta:
        topic: legacy-b-topic
        group-id: legacy-b-group
        concurrency: 1
      gamma:
        topic: legacy-c-topic
        group-id: legacy-c-group
        concurrency: 1
